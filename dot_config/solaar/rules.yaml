%YAML 1.3
---
- Rule:
  - MouseGesture: Mouse Down
  - KeyPress:
    - F5
    - click
- Rule:
  - MouseGesture: Mouse Up
  - Execute: [playerctl, play-pause, --ignore-player=GSConnect]
- Rule:
  - MouseGesture: Mouse Left
  - Execute: [niri, msg, action, focus-column-or-monitor-left]
- Rule:
  - MouseGesture: Mouse Right
  - Execute: [niri, msg, action, focus-column-or-monitor-right]
- Rule:
  - MouseGesture: []
  - Execute: [niri, msg, action, toggle-overview]
- Rule:
  - MouseGesture: Mouse Right
  - KeyPress:
    - [Control_L, Page_Down]
    - click
- Rule:
  - MouseGesture: Mouse Left
  - KeyPress:
    - [Control_L, Page_Up]
    - click
- Rule:
  - MouseGesture: [Mouse Up, Mouse Down]
  - KeyPress:
    - [Super_L, L]
    - click
- Rule:
  - Test: [thumb_wheel_up, 14]
  - Execute: [niri, msg, action, focus-column-or-monitor-right]
- Rule:
  - Test: [thumb_wheel_down, 14]
  - Execute: [niri, msg, action, focus-column-or-monitor-left]
- Rule:
  - Rule: []
...
